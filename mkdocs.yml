site_name: Albion ZvZ Manual
site_description: The Field Manual for Large-Scale Albion Warfare
site_author: Albion ZvZ Manual Project
theme:
  name: material
  features:
  - navigation.sections
  - navigation.indexes
  - navigation.top
  - toc.follow
  - search.suggest
  - search.highlight
  palette:
  - scheme: default
    primary: blue grey
    accent: deep orange
extra_css:
- assets/stylesheets/extra.css
markdown_extensions:
- admonition
- tables
- toc:
    permalink: true
- pymdownx.superfences
- pymdownx.details
- attr_list
