  <path d="M255,325 C300,270 345,230 395,205" stroke="#166534" stroke-width="5" fill="none"/>
  <circle cx="720" cy="390" r="40" fill="#fff2cc" stroke="#c75b12" stroke-width="4"/>
  <text x="667" y="455" font-size="16" font-family="Arial" fill="#92400e" font-weight="700">Safe but useless</text>
  <path d="M690,370 C610,310 580,250 525,210" stroke="#c75b12" stroke-width="4" fill="none" stroke-dasharray="10 8"/>
  <rect x="50" y="430" width="430" height="55" rx="12" fill="#eef6fb" stroke="#b7c9d6"/>
  <text x="75" y="463" font-size="16" font-family="Arial" fill="#111827">The correct heal target is the danger area, not the safest screen position.</text>
