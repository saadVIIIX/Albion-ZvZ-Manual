  <ellipse cx="450" cy="190" rx="150" ry="70" fill="#fee2e2" stroke="#b91c1c" stroke-width="4"/>
  <text x="365" y="195" font-size="18" font-family="Arial" fill="#991b1b" font-weight="700">Danger area</text>
  <g fill="#0f5b78"><circle cx="320" cy="220" r="14"/><circle cx="350" cy="245" r="14"/><circle cx="380" cy="215" r="14"/><circle cx="410" cy="245" r="14"/></g>
  <g fill="#166534"><circle cx="230" cy="330" r="15"/><circle cx="260" cy="355" r="15"/></g>
