  <text x="40" y="80" font-size="16" font-family="Arial" fill="#374151">Healers and supports must cover where damage actually lands, not only the safest backline.</text>
  <rect x="390" y="130" width="120" height="260" rx="16" fill="#d1d5db" stroke="#6b7280" stroke-width="3"/>
