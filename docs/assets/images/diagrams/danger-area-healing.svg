<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" role="img" aria-label="Danger-Area Healing">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef7fc"/><stop offset="0.65" stop-color="#ffffff"/><stop offset="1" stop-color="#fff2e8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f2f4a" flood-opacity="0.18"/></filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#195b89"/></marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#e66a1a"/></marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#b91c1c"/></marker>
    <style>
      .title{font:700 28px Arial, sans-serif; fill:#0f2f4a}
      .sub{font:400 15px Arial, sans-serif; fill:#334155}
      .label{font:700 15px Arial, sans-serif; fill:#0f2f4a}
      .small{font:400 13px Arial, sans-serif; fill:#334155}
      .unit{fill:#195b89; stroke:#ffffff; stroke-width:3}
      .enemy{fill:#b91c1c; stroke:#ffffff; stroke-width:3}
      .support{fill:#0f6a7a; stroke:#ffffff; stroke-width:3}
      .healer{fill:#16a34a; stroke:#ffffff; stroke-width:3}
      .danger{fill:#fee2e2; stroke:#b91c1c; stroke-width:3; stroke-dasharray:8 6}
      .safe{fill:#e8f5e9; stroke:#16a34a; stroke-width:2; stroke-dasharray:5 5}
      .panel{fill:#ffffff; stroke:#a8bdcc; stroke-width:1.5; filter:url(#shadow)}
    </style>
  </defs>
  <rect width="920" height="560" rx="18" fill="url(#bg)"/>
  <text x="34" y="44" class="title">Danger-Area Healing</text>
  <text x="34" y="72" class="sub">Heal the bombed area, not only the safest party frames.</text>
  
  <ellipse cx="455" cy="282" rx="150" ry="86" class="danger"/>
  <text x="407" y="286" class="label" fill="#991b1b">Danger area</text>
  <g><circle cx="420" cy="266" r="17" class="unit"/><circle cx="470" cy="300" r="17" class="unit"/><circle cx="515" cy="258" r="17" class="unit"/><circle cx="372" cy="315" r="17" class="unit"/></g>
  <g><circle cx="255" cy="358" r="18" class="healer"/><circle cx="300" cy="390" r="18" class="healer"/></g>
  <path d="M270,350 C315,318 360,296 407,284" stroke="#16a34a" stroke-width="6" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M308,388 C350,355 390,320 455,300" stroke="#16a34a" stroke-width="6" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="655" y="340" width="145" height="76" rx="14" fill="#e8f5e9" stroke="#16a34a" stroke-width="2"/>
  <text x="674" y="372" class="label">Safe backline</text>
  <path d="M255,358 C410,445 560,440 660,382" stroke="#b91c1c" stroke-width="4" fill="none" marker-end="url(#arrow-red)" stroke-dasharray="8 8"/>
  <text x="430" y="456" class="small" fill="#991b1b">bad: healing only safe players</text>
  <rect x="56" y="438" width="330" height="74" rx="12" class="panel"/>
  <text x="78" y="466" class="label">Decision:</text><text x="153" y="466" class="small">place healing where pressure lands.</text>
  <text x="78" y="490" class="small">Living healers still fail if the danger area dies.</text>

</svg>