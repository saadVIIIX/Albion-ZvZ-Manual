<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" role="img" aria-label="Kite Route and Turn Window">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef7fc"/><stop offset="0.65" stop-color="#ffffff"/><stop offset="1" stop-color="#fff2e8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f2f4a" flood-opacity="0.18"/></filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#195b89"/></marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#e66a1a"/></marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#b91c1c"/></marker>
    <style>
      .title{font:700 28px Arial, sans-serif; fill:#0f2f4a}
      .sub{font:400 15px Arial, sans-serif; fill:#334155}
      .label{font:700 15px Arial, sans-serif; fill:#0f2f4a}
      .small{font:400 13px Arial, sans-serif; fill:#334155}
      .unit{fill:#195b89; stroke:#ffffff; stroke-width:3}
      .enemy{fill:#b91c1c; stroke:#ffffff; stroke-width:3}
      .support{fill:#0f6a7a; stroke:#ffffff; stroke-width:3}
      .healer{fill:#16a34a; stroke:#ffffff; stroke-width:3}
      .danger{fill:#fee2e2; stroke:#b91c1c; stroke-width:3; stroke-dasharray:8 6}
      .safe{fill:#e8f5e9; stroke:#16a34a; stroke-width:2; stroke-dasharray:5 5}
      .panel{fill:#ffffff; stroke:#a8bdcc; stroke-width:1.5; filter:url(#shadow)}
    </style>
  </defs>
  <rect width="920" height="560" rx="18" fill="url(#bg)"/>
  <text x="34" y="44" class="title">Kite Route and Turn Window</text>
  <text x="34" y="72" class="sub">Kite far enough to break enemy cooldowns, then turn together.</text>
  
  <rect x="430" y="125" width="70" height="300" rx="18" fill="#d9e4eb" stroke="#8da9bb" stroke-width="2"/>
  <text x="430" y="110" class="small">terrain / choke</text>
  <ellipse cx="255" cy="265" rx="115" ry="74" class="danger"/>
  <text x="208" y="269" class="label" fill="#991b1b">Enemy engage</text>
  <path d="M635,170 C560,205 520,255 530,315 C545,390 640,420 745,370" stroke="#195b89" stroke-width="7" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="610" y="150" class="label">Kite route</text>
  <path d="M740,370 C665,330 605,300 540,305" stroke="#e66a1a" stroke-width="6" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="642" y="332" class="label" fill="#8a390b">Turn window</text>
  <g><circle cx="640" cy="174" r="17" class="unit"/><circle cx="594" cy="214" r="17" class="unit"/><circle cx="545" cy="274" r="17" class="unit"/><circle cx="580" cy="370" r="17" class="unit"/><circle cx="710" cy="384" r="17" class="unit"/></g>
  <path d="M620,185 C520,125 410,130 315,210" stroke="#b91c1c" stroke-width="4" fill="none" marker-end="url(#arrow-red)" stroke-dasharray="8 8"/>
  <text x="330" y="172" class="small" fill="#991b1b">bad: panic path through enemy threat</text>
  <rect x="56" y="438" width="390" height="74" rx="12" class="panel"/>
  <text x="78" y="466" class="label">Decision:</text><text x="153" y="466" class="small">stop running when enemy cooldowns are spent.</text>
  <text x="78" y="490" class="small">A kite only wins if safe players turn into pressure.</text>

</svg>