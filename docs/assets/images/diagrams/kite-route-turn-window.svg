<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#f8fafc"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#0f5b78"/></marker></defs>
  <text x="40" y="45" font-size="28" font-family="Arial" fill="#1f4e78" font-weight="700">Kite Route + Turn Window</text>
  <text x="40" y="80" font-size="16" font-family="Arial" fill="#374151">Kite just far enough to make enemy mobility expire, then turn as a unit.</text>
  <rect x="330" y="120" width="220" height="270" rx="30" fill="#d9eaf7" stroke="#1f4e78" stroke-width="4"/>
  <text x="385" y="260" font-size="20" font-family="Arial" fill="#1f4e78" font-weight="700">Terrain</text>
  <path d="M160,360 C250,430 570,435 710,320" stroke="#0f5b78" stroke-width="7" fill="none" marker-end="url(#arrow)"/>
  <text x="130" y="335" font-size="16" font-family="Arial" fill="#0f5b78" font-weight="700">Friendly kite route</text>
  <path d="M700,160 C655,230 650,290 710,320" stroke="#b91c1c" stroke-width="6" fill="none" stroke-dasharray="12 8" marker-end="url(#arrow)"/>
  <text x="660" y="135" font-size="16" font-family="Arial" fill="#991b1b" font-weight="700">Enemy chase</text>
  <circle cx="710" cy="320" r="52" fill="#e2f0d9" stroke="#166534" stroke-width="4"/>
  <text x="665" y="315" font-size="16" font-family="Arial" fill="#166534" font-weight="700">Turn</text>
  <text x="656" y="338" font-size="16" font-family="Arial" fill="#166534" font-weight="700">window</text>
  <rect x="50" y="410" width="360" height="70" rx="12" fill="#eef6fb" stroke="#b7c9d6"/>
  <text x="75" y="438" font-size="16" font-family="Arial" fill="#111827" font-weight="700">Good:</text>
  <text x="130" y="438" font-size="16" font-family="Arial" fill="#111827">stay close enough to turn.</text>
  <text x="75" y="462" font-size="16" font-family="Arial" fill="#111827">Bad kite = one screen away, no counter.</text>
</svg>