<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" role="img" aria-label="DPS Timing Sequence">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef7fc"/><stop offset="0.65" stop-color="#ffffff"/><stop offset="1" stop-color="#fff2e8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f2f4a" flood-opacity="0.18"/></filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#195b89"/></marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#e66a1a"/></marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#b91c1c"/></marker>
    <style>
      .title{font:700 28px Arial, sans-serif; fill:#0f2f4a}
      .sub{font:400 15px Arial, sans-serif; fill:#334155}
      .label{font:700 15px Arial, sans-serif; fill:#0f2f4a}
      .small{font:400 13px Arial, sans-serif; fill:#334155}
      .unit{fill:#195b89; stroke:#ffffff; stroke-width:3}
      .enemy{fill:#b91c1c; stroke:#ffffff; stroke-width:3}
      .support{fill:#0f6a7a; stroke:#ffffff; stroke-width:3}
      .healer{fill:#16a34a; stroke:#ffffff; stroke-width:3}
      .danger{fill:#fee2e2; stroke:#b91c1c; stroke-width:3; stroke-dasharray:8 6}
      .safe{fill:#e8f5e9; stroke:#16a34a; stroke-width:2; stroke-dasharray:5 5}
      .panel{fill:#ffffff; stroke:#a8bdcc; stroke-width:1.5; filter:url(#shadow)}
    </style>
  </defs>
  <rect width="920" height="560" rx="18" fill="url(#bg)"/>
  <text x="34" y="44" class="title">DPS Timing Sequence</text>
  <text x="34" y="72" class="sub">Utility must land before or with damage, not after it.</text>
  
  <line x1="100" y1="285" x2="820" y2="285" stroke="#9fb7c8" stroke-width="4"/>
  <g>
    <circle cx="170" cy="285" r="30" fill="#dbeafe" stroke="#195b89" stroke-width="4"/><text x="147" y="290" class="label">Lock</text>
    <circle cx="355" cy="285" r="30" fill="#fff7ed" stroke="#e66a1a" stroke-width="4"/><text x="334" y="290" class="label">Pierce</text>
    <circle cx="545" cy="285" r="30" fill="#fee2e2" stroke="#b91c1c" stroke-width="4"/><text x="518" y="290" class="label">Damage</text>
    <circle cx="730" cy="285" r="30" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/><text x="705" y="290" class="label">Spread</text>
  </g>
  <text x="120" y="215" class="small">1. clump/lock exists</text>
  <text x="300" y="215" class="small">2. utility lands</text>
  <text x="490" y="215" class="small">3. damage lands</text>
  <text x="675" y="215" class="small">4. exit/reset</text>
  <path d="M470,365 C415,390 350,385 310,350" stroke="#b91c1c" stroke-width="5" fill="none" marker-end="url(#arrow-red)" stroke-dasharray="8 8"/>
  <text x="300" y="410" class="small" fill="#991b1b">bad: utility after damage</text>
  <rect x="56" y="438" width="390" height="74" rx="12" class="panel"/>
  <text x="78" y="466" class="label">Decision:</text><text x="153" y="466" class="small">cast so damage lands on the window.</text>
  <text x="78" y="490" class="small">Starting at zero is often late if your spell has travel/cast time.</text>

</svg>