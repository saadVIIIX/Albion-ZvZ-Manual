<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0f5b78"/>
    </marker>
  </defs>
  <text x="40" y="45" font-size="28" font-family="Arial" fill="#1f4e78" font-weight="700">Crescent Pressure</text>
  <text x="40" y="80" font-size="16" font-family="Arial" fill="#374151">Friendly zerg builds a curve around enemy space without becoming one bombable pile.</text>
  <ellipse cx="540" cy="270" rx="130" ry="80" fill="#fee2e2" stroke="#b91c1c" stroke-width="3"/>
  <text x="485" y="275" font-size="20" font-family="Arial" fill="#991b1b" font-weight="700">Enemy space</text>
  <path d="M210,360 C260,210 420,130 610,145" fill="none" stroke="#1f4e78" stroke-width="7" stroke-linecap="round"/>
  <path d="M230,380 C315,430 520,445 690,360" fill="none" stroke="#1f4e78" stroke-width="7" stroke-linecap="round"/>
  <g fill="#0f5b78">
    <circle cx="230" cy="355" r="16"/><circle cx="280" cy="275" r="16"/><circle cx="360" cy="205" r="16"/>
    <circle cx="470" cy="165" r="16"/><circle cx="600" cy="155" r="16"/><circle cx="260" cy="395" r="16"/>
    <circle cx="370" cy="430" r="16"/><circle cx="500" cy="430" r="16"/><circle cx="650" cy="375" r="16"/>
  </g>
  <text x="95" y="250" font-size="17" font-family="Arial" fill="#1f4e78">Friendly arc</text>
  <path d="M180,250 C230,230 250,215 285,190" stroke="#0f5b78" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <rect x="60" y="410" width="300" height="70" rx="12" fill="#eef6fb" stroke="#b7c9d6"/>
  <text x="80" y="438" font-size="16" font-family="Arial" fill="#111827" font-weight="700">Good:</text>
  <text x="130" y="438" font-size="16" font-family="Arial" fill="#111827">threaten space from angles</text>
  <text x="80" y="462" font-size="16" font-family="Arial" fill="#111827">Do not stack into one damage circle.</text>
  <circle cx="760" cy="270" r="48" fill="#fff2cc" stroke="#c75b12" stroke-width="3"/>
  <text x="718" y="275" font-size="16" font-family="Arial" fill="#92400e" font-weight="700">Bad pile</text>
</svg>