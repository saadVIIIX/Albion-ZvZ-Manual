<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" role="img" aria-label="Crescent Pressure">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef7fc"/><stop offset="0.65" stop-color="#ffffff"/><stop offset="1" stop-color="#fff2e8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f2f4a" flood-opacity="0.18"/></filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#195b89"/></marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#e66a1a"/></marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#b91c1c"/></marker>
    <style>
      .title{font:700 28px Arial, sans-serif; fill:#0f2f4a}
      .sub{font:400 15px Arial, sans-serif; fill:#334155}
      .label{font:700 15px Arial, sans-serif; fill:#0f2f4a}
      .small{font:400 13px Arial, sans-serif; fill:#334155}
      .unit{fill:#195b89; stroke:#ffffff; stroke-width:3}
      .enemy{fill:#b91c1c; stroke:#ffffff; stroke-width:3}
      .support{fill:#0f6a7a; stroke:#ffffff; stroke-width:3}
      .healer{fill:#16a34a; stroke:#ffffff; stroke-width:3}
      .danger{fill:#fee2e2; stroke:#b91c1c; stroke-width:3; stroke-dasharray:8 6}
      .safe{fill:#e8f5e9; stroke:#16a34a; stroke-width:2; stroke-dasharray:5 5}
      .panel{fill:#ffffff; stroke:#a8bdcc; stroke-width:1.5; filter:url(#shadow)}
    </style>
  </defs>
  <rect width="920" height="560" rx="18" fill="url(#bg)"/>
  <text x="34" y="44" class="title">Crescent Pressure</text>
  <text x="34" y="72" class="sub">Win space with angles; do not become one bombable pile.</text>
  
  <ellipse cx="555" cy="282" rx="125" ry="78" class="danger"/>
  <text x="510" y="286" class="label" fill="#991b1b">Enemy space</text>
  <path d="M205,365 C255,220 415,135 630,150" fill="none" stroke="#195b89" stroke-width="8" stroke-linecap="round"/>
  <path d="M235,400 C350,455 560,438 710,345" fill="none" stroke="#195b89" stroke-width="8" stroke-linecap="round"/>
  <g><circle cx="220" cy="360" r="17" class="unit"/><circle cx="280" cy="275" r="17" class="unit"/><circle cx="370" cy="205" r="17" class="unit"/><circle cx="500" cy="158" r="17" class="unit"/><circle cx="630" cy="152" r="17" class="unit"/><circle cx="260" cy="405" r="17" class="unit"/><circle cx="390" cy="440" r="17" class="unit"/><circle cx="535" cy="430" r="17" class="unit"/><circle cx="685" cy="360" r="17" class="unit"/></g>
  <path d="M118,278 C165,244 228,221 286,196" stroke="#195b89" stroke-width="4" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="65" y="276" class="label">Friendly arc</text>
  <circle cx="780" cy="284" r="48" fill="#fff2e8" stroke="#e66a1a" stroke-width="4"/>
  <text x="741" y="288" class="label" fill="#8a390b">Bad pile</text>
  <rect x="58" y="438" width="350" height="72" rx="12" class="panel"/>
  <text x="80" y="466" class="label">Decision:</text><text x="155" y="466" class="small">hold a curved threat line.</text>
  <text x="80" y="490" class="small">Spread enough that one enemy bomb cannot hit everyone.</text>

</svg>