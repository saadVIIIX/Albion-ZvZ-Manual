<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" role="img" aria-label="First Through Takes Outside">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef7fc"/><stop offset="0.65" stop-color="#ffffff"/><stop offset="1" stop-color="#fff2e8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f2f4a" flood-opacity="0.18"/></filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#195b89"/></marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#e66a1a"/></marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#b91c1c"/></marker>
    <style>
      .title{font:700 28px Arial, sans-serif; fill:#0f2f4a}
      .sub{font:400 15px Arial, sans-serif; fill:#334155}
      .label{font:700 15px Arial, sans-serif; fill:#0f2f4a}
      .small{font:400 13px Arial, sans-serif; fill:#334155}
      .unit{fill:#195b89; stroke:#ffffff; stroke-width:3}
      .enemy{fill:#b91c1c; stroke:#ffffff; stroke-width:3}
      .support{fill:#0f6a7a; stroke:#ffffff; stroke-width:3}
      .healer{fill:#16a34a; stroke:#ffffff; stroke-width:3}
      .danger{fill:#fee2e2; stroke:#b91c1c; stroke-width:3; stroke-dasharray:8 6}
      .safe{fill:#e8f5e9; stroke:#16a34a; stroke-width:2; stroke-dasharray:5 5}
      .panel{fill:#ffffff; stroke:#a8bdcc; stroke-width:1.5; filter:url(#shadow)}
    </style>
  </defs>
  <rect width="920" height="560" rx="18" fill="url(#bg)"/>
  <text x="34" y="44" class="title">First Through Takes Outside</text>
  <text x="34" y="72" class="sub">Early crossers should open side angles instead of stopping center.</text>
  
  <rect x="395" y="115" width="120" height="330" rx="10" fill="#d9e4eb" stroke="#7a99ad" stroke-width="3"/>
  <text x="398" y="98" class="label">choke exit</text>
  <ellipse cx="455" cy="282" rx="86" ry="120" class="danger"/>
  <g><circle cx="330" cy="225" r="17" class="unit"/><circle cx="330" cy="338" r="17" class="unit"/><circle cx="585" cy="218" r="17" class="unit"/><circle cx="585" cy="345" r="17" class="unit"/></g>
  <path d="M455,455 C405,385 355,310 330,225" stroke="#195b89" stroke-width="6" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M455,455 C510,380 560,300 585,218" stroke="#195b89" stroke-width="6" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M455,455 C455,390 455,335 455,288" stroke="#e66a1a" stroke-width="6" fill="none" marker-end="url(#arrow-orange)" stroke-dasharray="10 8"/>
  <text x="480" y="355" class="small" fill="#8a390b">bad: everyone stacks center</text>
  <path d="M720,210 C660,220 610,250 535,275" stroke="#b91c1c" stroke-width="6" fill="none" marker-end="url(#arrow-red)"/>
  <text x="670" y="190" class="small" fill="#991b1b">enemy punish path</text>
  <rect x="56" y="438" width="360" height="74" rx="12" class="panel"/>
  <text x="78" y="466" class="label">Decision:</text><text x="153" y="466" class="small">first players create side space.</text>
  <text x="78" y="490" class="small">Later players pass through instead of adding to a clump.</text>

</svg>