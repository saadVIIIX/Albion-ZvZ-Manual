<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#f8fafc"/>
  <text x="40" y="45" font-size="28" font-family="Arial" fill="#1f4e78" font-weight="700">Defensive Layering</text>
  <text x="40" y="80" font-size="16" font-family="Arial" fill="#374151">Multiple layers should cover the same real danger area instead of scattering onto safe space.</text>
  <ellipse cx="455" cy="255" rx="175" ry="115" fill="#fee2e2" stroke="#b91c1c" stroke-width="4"/>
  <ellipse cx="455" cy="255" rx="135" ry="85" fill="none" stroke="#0f5b78" stroke-width="5"/>
  <ellipse cx="455" cy="255" rx="95" ry="60" fill="none" stroke="#166534" stroke-width="5" stroke-dasharray="12 8"/>
  <ellipse cx="455" cy="255" rx="55" ry="35" fill="none" stroke="#c75b12" stroke-width="5"/>
  <text x="330" y="155" font-size="16" font-family="Arial" fill="#991b1b" font-weight="700">Enemy damage area</text>
  <text x="610" y="235" font-size="16" font-family="Arial" fill="#1f4e78" font-weight="700">Locus / cleanse</text>
  <text x="610" y="265" font-size="16" font-family="Arial" fill="#166534" font-weight="700">Heals / Nature</text>
  <text x="610" y="295" font-size="16" font-family="Arial" fill="#c75b12" font-weight="700">Oath / Guard</text>
  <g fill="#0f5b78"><circle cx="420" cy="250" r="12"/><circle cx="455" cy="250" r="12"/><circle cx="490" cy="250" r="12"/></g>
  <rect x="70" y="390" width="420" height="75" rx="12" fill="#eef6fb" stroke="#b7c9d6"/>
  <text x="95" y="420" font-size="16" font-family="Arial" fill="#111827" font-weight="700">Good:</text>
  <text x="150" y="420" font-size="16" font-family="Arial" fill="#111827">layers overlap where people are actually dying.</text>
  <text x="95" y="446" font-size="16" font-family="Arial" fill="#111827">Bad: defensives scattered on safe backline.</text>
</svg>