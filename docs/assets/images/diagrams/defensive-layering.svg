<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" role="img" aria-label="Defensive Layering">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef7fc"/><stop offset="0.65" stop-color="#ffffff"/><stop offset="1" stop-color="#fff2e8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f2f4a" flood-opacity="0.18"/></filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#195b89"/></marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#e66a1a"/></marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#b91c1c"/></marker>
    <style>
      .title{font:700 28px Arial, sans-serif; fill:#0f2f4a}
      .sub{font:400 15px Arial, sans-serif; fill:#334155}
      .label{font:700 15px Arial, sans-serif; fill:#0f2f4a}
      .small{font:400 13px Arial, sans-serif; fill:#334155}
      .unit{fill:#195b89; stroke:#ffffff; stroke-width:3}
      .enemy{fill:#b91c1c; stroke:#ffffff; stroke-width:3}
      .support{fill:#0f6a7a; stroke:#ffffff; stroke-width:3}
      .healer{fill:#16a34a; stroke:#ffffff; stroke-width:3}
      .danger{fill:#fee2e2; stroke:#b91c1c; stroke-width:3; stroke-dasharray:8 6}
      .safe{fill:#e8f5e9; stroke:#16a34a; stroke-width:2; stroke-dasharray:5 5}
      .panel{fill:#ffffff; stroke:#a8bdcc; stroke-width:1.5; filter:url(#shadow)}
    </style>
  </defs>
  <rect width="920" height="560" rx="18" fill="url(#bg)"/>
  <text x="34" y="44" class="title">Defensive Layering</text>
  <text x="34" y="72" class="sub">Different tools should cover the same real danger area.</text>
  
  <ellipse cx="500" cy="275" rx="145" ry="86" class="danger"/>
  <text x="452" y="279" class="label" fill="#991b1b">Enemy damage</text>
  <path d="M760,205 C690,220 635,250 585,270" stroke="#b91c1c" stroke-width="7" fill="none" marker-end="url(#arrow-red)"/>
  <text x="715" y="188" class="small" fill="#991b1b">incoming engage</text>
  <g><circle cx="398" cy="260" r="17" class="unit"/><circle cx="445" cy="306" r="17" class="unit"/><circle cx="520" cy="316" r="17" class="unit"/></g>
  <circle cx="570" cy="225" r="25" fill="#dbeafe" stroke="#195b89" stroke-width="4"/><text x="552" y="230" class="label">L</text>
  <circle cx="350" cy="335" r="25" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/><text x="330" y="340" class="label">Heal</text>
  <circle cx="445" cy="198" r="25" fill="#fff7ed" stroke="#e66a1a" stroke-width="4"/><text x="428" y="203" class="label">Res</text>
  <path d="M570,225 C545,245 525,260 500,274" stroke="#195b89" stroke-width="4" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M350,335 C405,318 450,300 500,284" stroke="#16a34a" stroke-width="4" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M445,198 C460,225 478,250 500,273" stroke="#e66a1a" stroke-width="4" fill="none" marker-end="url(#arrow-orange)"/>
  <rect x="56" y="438" width="390" height="74" rx="12" class="panel"/>
  <text x="78" y="466" class="label">Decision:</text><text x="153" y="466" class="small">layer tools on danger, not safe space.</text>
  <text x="78" y="490" class="small">Late or misplaced defensives look active but save nobody.</text>

</svg>