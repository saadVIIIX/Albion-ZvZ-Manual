<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" role="img" aria-label="Choke / Door Danger Box">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef7fc"/><stop offset="0.65" stop-color="#ffffff"/><stop offset="1" stop-color="#fff2e8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f2f4a" flood-opacity="0.18"/></filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#195b89"/></marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#e66a1a"/></marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#b91c1c"/></marker>
    <style>
      .title{font:700 28px Arial, sans-serif; fill:#0f2f4a}
      .sub{font:400 15px Arial, sans-serif; fill:#334155}
      .label{font:700 15px Arial, sans-serif; fill:#0f2f4a}
      .small{font:400 13px Arial, sans-serif; fill:#334155}
      .unit{fill:#195b89; stroke:#ffffff; stroke-width:3}
      .enemy{fill:#b91c1c; stroke:#ffffff; stroke-width:3}
      .support{fill:#0f6a7a; stroke:#ffffff; stroke-width:3}
      .healer{fill:#16a34a; stroke:#ffffff; stroke-width:3}
      .danger{fill:#fee2e2; stroke:#b91c1c; stroke-width:3; stroke-dasharray:8 6}
      .safe{fill:#e8f5e9; stroke:#16a34a; stroke-width:2; stroke-dasharray:5 5}
      .panel{fill:#ffffff; stroke:#a8bdcc; stroke-width:1.5; filter:url(#shadow)}
    </style>
  </defs>
  <rect width="920" height="560" rx="18" fill="url(#bg)"/>
  <text x="34" y="44" class="title">Choke / Door Danger Box</text>
  <text x="34" y="72" class="sub">Do not stop inside the predictable enemy bomb line.</text>
  
  <rect x="410" y="115" width="105" height="330" rx="10" fill="#d9e4eb" stroke="#7a99ad" stroke-width="3"/>
  <text x="408" y="98" class="label">door / choke</text>
  <ellipse cx="463" cy="282" rx="96" ry="138" class="danger"/>
  <text x="415" y="282" class="label" fill="#991b1b">Danger box</text>
  <path d="M720,280 C650,280 585,280 525,280" stroke="#b91c1c" stroke-width="7" fill="none" marker-end="url(#arrow-red)"/>
  <g><circle cx="330" cy="180" r="17" class="unit"/><circle cx="320" cy="375" r="17" class="unit"/><circle cx="560" cy="175" r="17" class="unit"/><circle cx="560" cy="382" r="17" class="unit"/></g>
  <path d="M290,400 C320,335 330,250 330,178" stroke="#195b89" stroke-width="5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M598,386 C572,315 562,245 558,180" stroke="#195b89" stroke-width="5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M250,280 C330,280 400,280 455,280" stroke="#e66a1a" stroke-width="6" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="178" y="268" class="small" fill="#8a390b">bad: center-line pause</text>
  <rect x="56" y="438" width="405" height="74" rx="12" class="panel"/>
  <text x="78" y="466" class="label">Decision:</text><text x="153" y="466" class="small">cross or hold outside angles.</text>
  <text x="78" y="490" class="small">Tanks and supports cover the danger box until the group clears.</text>

</svg>